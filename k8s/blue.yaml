#define applications (versions) “What to run” (app, version, replicas)

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: blue-deployment
  name: blue-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      version: blue
  strategy: {}
  template:
    metadata:
      labels:
        app: nginx
        version: blue
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
